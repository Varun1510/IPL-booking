<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RCB Match Booking</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}

h1{
color:#ff0000;
margin-top:40px;
}

.container{
width:500px;
margin:auto;
}

.match{
background:#1e1e1e;
padding:20px;
margin:20px 0;
border-radius:10px;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.book{
background:#ff0000;
color:white;
}

.soon{
background:gray;
color:white;
cursor:not-allowed;
}

</style>
</head>

<body>

<h1>RCB Match Ticket Booking</h1>

<div class="container">

<div class="match">
<h3>RCB vs CSK</h3>
<p>Date: April 10, 2026</p>
<button class="book">Book Now</button>
</div>

<div class="match">
<h3>RCB vs MI</h3>
<p>Date: April 18, 2026</p>
<button class="soon">Coming Soon</button>
</div>

<div class="match">
<h3>RCB vs KKR</h3>
<p>Date: April 25, 2026</p>
<button class="soon">Coming Soon</button>
</div>

<div class="match">
<h3>RCB vs SRH</h3>
<p>Date: May 2, 2026</p>
<button class="soon">Coming Soon</button>
</div>

</div>

</body>
</html>
